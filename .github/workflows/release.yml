name: Build & Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version (e.g. 1.2.0)"
        required: true
        default: "1.0.0"
      changelog:
        description: "Changelog / release notes"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version and tag name
        id: ver
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${{ github.ref_name }}"
            VERSION="${VERSION#v}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION"    >> $GITHUB_OUTPUT

      - name: Bump version.py
        shell: bash
        run: |
          sed -i "s/^VERSION = .*/VERSION = \"${{ steps.ver.outputs.version }}\"/" backend/version.py

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build frontend
        run: |
          cd frontend
          npm install
          npm run build

      - name: Install Python dependencies
        run: |
          pip install -r backend/requirements.txt
          pip install pywebview pyinstaller

      - name: Build .exe with PyInstaller
        run: |
          pyinstaller `
            --onefile `
            --windowed `
            --name "RustServerManager" `
            --add-data "backend;backend" `
            --add-data "frontend/dist;frontend/dist" `
            --hidden-import uvicorn.logging `
            --hidden-import uvicorn.loops `
            --hidden-import uvicorn.loops.auto `
            --hidden-import uvicorn.protocols `
            --hidden-import uvicorn.protocols.http `
            --hidden-import uvicorn.protocols.http.auto `
            --hidden-import uvicorn.protocols.http.h11_impl `
            --hidden-import uvicorn.protocols.websockets `
            --hidden-import uvicorn.protocols.websockets.auto `
            --hidden-import uvicorn.protocols.websockets.websockets_impl `
            --hidden-import uvicorn.lifespan `
            --hidden-import uvicorn.lifespan.on `
            --hidden-import fastapi `
            --hidden-import fastapi.middleware.cors `
            --hidden-import fastapi.staticfiles `
            --hidden-import fastapi.responses `
            --hidden-import psutil `
            --hidden-import aiofiles `
            --hidden-import websockets `
            --hidden-import webview `
            --collect-all uvicorn `
            --collect-all fastapi `
            --collect-all webview `
            launcher.py

      - name: Resolve changelog body
        id: changelog
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            BODY="${{ github.event.inputs.changelog }}"
            if [ -z "$BODY" ]; then
              BODY="Release v${{ steps.ver.outputs.version }}"
            fi
          else
            TAG="${{ github.ref_name }}"
            BODY=$(git tag -l --format='%(contents)' "$TAG" | head -50)
            if [ -z "$BODY" ]; then
              BODY="Release $TAG"
            fi
          fi
          echo "body<<EOF" >> $GITHUB_OUTPUT
          echo "$BODY"     >> $GITHUB_OUTPUT
          echo "EOF"       >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "${{ steps.ver.outputs.tag }}"
          name: "Rust Server Manager v${{ steps.ver.outputs.version }}"
          body: ${{ steps.changelog.outputs.body }}
          files: dist/RustServerManager.exe
          draft: false
          prerelease: false
