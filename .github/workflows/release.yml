name: Build & Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version (ex: 1.0.0)"
        required: true
        default: "1.0.0"
      changelog:
        description: "Changelog / release notes"
        required: false
        default: "Release manuelle"

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Resolve version and tag name
        id: meta
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_VERSION: ${{ github.event.inputs.version }}
          INPUT_CHANGELOG: ${{ github.event.inputs.changelog }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            echo "version=${INPUT_VERSION}" >> $GITHUB_OUTPUT
            echo "tag=v${INPUT_VERSION}" >> $GITHUB_OUTPUT
            # Use heredoc to safely write multiline changelog
            {
              echo "changelog<<EOF_CHANGELOG"
              echo "${INPUT_CHANGELOG}"
              echo "EOF_CHANGELOG"
            } >> $GITHUB_OUTPUT
          else
            TAG="$REF_NAME"
            VER="${TAG#v}"
            MSG=$(git tag -l --format='%(contents)' "$TAG" | head -50)
            [ -z "$MSG" ] && MSG="Release $TAG"
            echo "version=${VER}" >> $GITHUB_OUTPUT
            echo "tag=${TAG}" >> $GITHUB_OUTPUT
            {
              echo "changelog<<EOF_CHANGELOG"
              echo "${MSG}"
              echo "EOF_CHANGELOG"
            } >> $GITHUB_OUTPUT
          fi

      - name: Bump version.py
        shell: bash
        env:
          VERSION: ${{ steps.meta.outputs.version }}
        run: |
          sed -i "s/^VERSION = .*/VERSION = \"${VERSION}\"/" backend/version.py

      - name: Build frontend
        run: |
          cd frontend
          npm install
          npm run build

      - name: Install Python dependencies
        run: |
          pip install -r backend/requirements.txt
          pip install pywebview pyinstaller

      - name: Build onedir with PyInstaller
        run: |
          pyinstaller `
            --onedir `
            --windowed `
            --name "RustServerManager" `
            --add-data "backend;backend" `
            --add-data "frontend/dist;frontend/dist" `
            --hidden-import uvicorn.logging `
            --hidden-import uvicorn.loops `
            --hidden-import uvicorn.loops.auto `
            --hidden-import uvicorn.protocols `
            --hidden-import uvicorn.protocols.http `
            --hidden-import uvicorn.protocols.http.auto `
            --hidden-import uvicorn.protocols.http.h11_impl `
            --hidden-import uvicorn.protocols.websockets `
            --hidden-import uvicorn.protocols.websockets.auto `
            --hidden-import uvicorn.protocols.websockets.websockets_impl `
            --hidden-import uvicorn.lifespan `
            --hidden-import uvicorn.lifespan.on `
            --hidden-import fastapi `
            --hidden-import fastapi.middleware.cors `
            --hidden-import fastapi.staticfiles `
            --hidden-import fastapi.responses `
            --hidden-import psutil `
            --hidden-import aiofiles `
            --hidden-import websockets `
            --hidden-import webview `
            --hidden-import certifi `
            --collect-all uvicorn `
            --collect-all fastapi `
            --collect-all webview `
            --collect-data certifi `
            launcher.py

      - name: Package onedir as ZIP
        shell: pwsh
        run: |
          Compress-Archive -Path dist/RustServerManager/* -DestinationPath dist/RustServerManager.zip -Force

      - name: Build legacy onefile (transition for old auto-updater)
        run: |
          pyinstaller `
            --onefile `
            --windowed `
            --name "RustServerManager" `
            --distpath dist_onefile `
            --workpath build_onefile `
            --add-data "backend;backend" `
            --add-data "frontend/dist;frontend/dist" `
            --hidden-import uvicorn.logging `
            --hidden-import uvicorn.loops `
            --hidden-import uvicorn.loops.auto `
            --hidden-import uvicorn.protocols `
            --hidden-import uvicorn.protocols.http `
            --hidden-import uvicorn.protocols.http.auto `
            --hidden-import uvicorn.protocols.http.h11_impl `
            --hidden-import uvicorn.protocols.websockets `
            --hidden-import uvicorn.protocols.websockets.auto `
            --hidden-import uvicorn.protocols.websockets.websockets_impl `
            --hidden-import uvicorn.lifespan `
            --hidden-import uvicorn.lifespan.on `
            --hidden-import fastapi `
            --hidden-import fastapi.middleware.cors `
            --hidden-import fastapi.staticfiles `
            --hidden-import fastapi.responses `
            --hidden-import psutil `
            --hidden-import aiofiles `
            --hidden-import websockets `
            --hidden-import webview `
            --collect-all uvicorn `
            --collect-all fastapi `
            --collect-all webview `
            launcher.py

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: "Rust Server Manager ${{ steps.meta.outputs.tag }}"
          body: ${{ steps.meta.outputs.changelog }}
          files: |
            dist/RustServerManager.zip
            dist_onefile/RustServerManager.exe
          draft: false
          prerelease: false
